name: eatplek_vendor_web
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  go_router: ^14.2.3
  dotted_border: ^2.1.0
  pinput: ^5.0.0
  file_picker: ^8.1.2
  dropdown_search: ^5.0.6
  intl: ^0.19.0
  bottom_picker: ^2.8.0
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.2.2
  animate_do: ^4.2.0
  loading_animation_widget: ^1.3.0
  percent_indicator: ^4.2.5
  dio: ^5.9.0
  skeletonizer: ^2.1.0+1
  colorful_safe_area: ^1.0.0
  animated_custom_dropdown: ^3.1.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - asset/fonts/
    - asset/images/
    - asset/gifs/

  fonts:
    - family: Urbanist
      fonts:
        - asset: asset/fonts/Urbanist-Bold.ttf
          weight: 700
    - family: FontLight
      fonts:
        - asset: asset/fonts/Urbanist-Regular.ttf
          weight: 400
    - family: FontMedium
      fonts:
        - asset: asset/fonts/Urbanist-Medium.ttf
          weight: 500
    - family: FontRegular
      fonts:
        - asset: asset/fonts/Urbanist-Thin.ttf
          weight: 300
